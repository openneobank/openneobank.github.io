# Building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting any tags starting with "v"
  push:
    tags: ["v*"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.317.0
        uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617
        with:
          # Gemfile.lock is BUNDLED WITH bundler 2.7.2, which requires Ruby >= 3.2.
          # This must stay >= 3.2 (matches local dev, which uses 3.4) or the
          # bundler-cache step's `gem install bundler` fails outright.
          ruby-version: '3.4'
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default. baseurl is intentionally
        # NOT overridden here — the site is served at the root of a custom domain
        # (see CNAME), so _config.yml's baseurl: "" must be left as-is. Passing
        # steps.pages.outputs.base_path would prefix every asset URL with
        # "/openneobank", breaking all absolute paths (CSS, JS, fonts) in production.
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
