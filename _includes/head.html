<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="theme-color" content="#ffffff">

<meta property="og:type" content="website">
<meta property="og:title" content="{{ site.title }} — {{ site.tagline }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:url" content="{{ site.url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ site.title }} — {{ site.tagline }}">
<meta name="twitter:description" content="{{ site.description }}">

<link rel="icon" href="{{ '/assets/images/logo.svg' | relative_url }}" type="image/svg+xml">

<link rel="preload" href="{{ '/assets/fonts/inter-var.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
